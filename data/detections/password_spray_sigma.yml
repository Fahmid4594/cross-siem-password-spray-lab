title: Potential Password Spraying Activity
id: a8747f5e-bd29-4598-a669-026cc2c7e1bc
status: experimental
description: Detects multiple failed network logon attempts from a single source IP targeting multiple distinct user accounts. This behavior strongly indicates a password spray attack.
author: Fahmid Zaman
date: 2026-07-04
tags:
    - attack.credential_access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
        LogonType: 3
    condition: selection | count(TargetUserName) by IpAddress > 5
falsepositives:
    - Corporate VPN egress points sharing a single NAT IP.
    - Authorized vulnerability scanners (e.g., Qualys, Nessus).
    - Misconfigured legacy applications or expired service account credentials.
level: high